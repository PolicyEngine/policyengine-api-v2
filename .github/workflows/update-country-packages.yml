name: Update country packages

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    name: Update ${{ matrix.package }}
    runs-on: ubuntu-latest
    if: github.repository == 'PolicyEngine/policyengine-api-v2'
    strategy:
      matrix:
        package: [policyengine-us, policyengine-uk]
      fail-fast: false

    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: main
          token: ${{ steps.app-token.outputs.token }}

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          save-cache: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Check for update and open PR
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: bash .github/scripts/update-country-package.sh ${{ matrix.package }}
